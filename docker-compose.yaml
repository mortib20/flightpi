services:
  readsb-main:
    build: ./readsb
    restart: unless-stopped
    environment:
      - READSB_LAT=${LAT}
      - READSB_LON=${LON}
      - READSB_DEVICE=0
      - READSB_GAIN=-10
    expose:
    - "30001"
    - "30002"
    - "30003"
    - "30004"
    - "30005"
    - "30104"
    command: ./main.sh
    volumes:
    - "/run/readsb/:/run/readsb/"
    - "./readsb/main.sh:/run/readsb/main.sh"
    devices:
    - "/dev/bus/usb/:/dev/bus/usb/"
